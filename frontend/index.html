<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bhai Irrfan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  width: 100vw;
  height: auto;
  overflow: visible;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 10px;
}

/* ── CRT flicker animation ─────────────────────────────────── */
@keyframes crt-flicker {
  0%   { opacity: 1; }
  92%  { opacity: 1; }
  93%  { opacity: 0.96; }
  94%  { opacity: 1; }
  98%  { opacity: 1; }
  99%  { opacity: 0.94; }
  100% { opacity: 1; }
}

@keyframes boot-in {
  0%   { opacity: 0; transform: scaleY(0.02); filter: brightness(3); }
  8%   { opacity: 1; transform: scaleY(1.01); filter: brightness(1.5); }
  12%  { transform: scaleY(0.99); }
  100% { transform: scaleY(1); filter: brightness(1); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes scan {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

/* ── Terminal container ────────────────────────────────────── */
#terminal {
  position: relative;
  width: 400px;
  height: auto;
  min-height: unset;
  animation: boot-in 0.6s ease-out forwards, crt-flicker 8s infinite 1s;
}

/* ── Scanline overlay ──────────────────────────────────────── */
#terminal::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 1px,
    rgba(163, 233, 218, 0.08) 1px,
    rgba(0, 0, 0, 0.08) 0px
  );
}

/* Moving scan beam */
#terminal::after {
  content: '';
  position: fixed;
  left: 0; right: 0;
  height: 80px;
  pointer-events: none;
  z-index: 99;
  background: linear-gradient(
    transparent,
    rgba(0, 255, 65, 0.015),
    transparent
  );
  animation: scan 6s linear infinite;
}

/* ── Title bar ─────────────────────────────────────────────── */
#titlebar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 0 4px 0;
  border-bottom: 1px solid #00ff41;
  cursor: grab;
  user-select: none;
  -webkit-app-region: drag;
  margin-bottom: 6px;
}

#titlebar button, #titlebar span[onclick] {
  -webkit-app-region: no-drag;
}

#titlebar:active { cursor: grabbing; }

#logo {
  font-family: 'VT323', monospace;
  font-size: 18px;
  color: #008a22;
  letter-spacing: 3px;
}

#version {
  font-size: 10px;
  color: #004a14;
  letter-spacing: 1px;
  margin-left: 6px;
}

.title-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

#dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00ff41;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 6px #00ff41;
}

#dot.offline {
  background: #ff2200;
  box-shadow: 0 0 6px #ff2200;
  animation: blink 0.6s step-end infinite;
}

.modebtn {
  background: transparent;
  border: 1px solid #004a14;
  color: #004a14;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 1px 6px;
  cursor: pointer;
  letter-spacing: 1px;
  -webkit-app-region: no-drag;
  transition: all 0.15s;
}

.modebtn:hover {
  border-color: #00ff41;
  color: #00ff41;
}

/* ── Alert ─────────────────────────────────────────────────── */
#alert {
  display: none;
  color: #ff2200;
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 5px;
  animation: blink 0.5s step-end infinite;
}

/* ── Section labels ────────────────────────────────────────── */
.lbl {
  font-size: 9px;
  color: #004a14;
  letter-spacing: 3px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.lbl::before {
  content: '>';
  color: #00ff41;
}

/* ── Divider ───────────────────────────────────────────────── */
.div {
  border: none;
  border-top: 1px solid #001a08;
  margin: 7px 0;
}

/* ── Scrollable content ────────────────────────────────────── */
#content {
  overflow-y: visible;
  overflow-x: hidden;
  padding-bottom: 30px;
}

#content::-webkit-scrollbar { display: none; }

/* ── Clock ─────────────────────────────────────────────────── */
.clock-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}

#clock {
  font-family: 'VT323', monospace;
  font-size: 48px;
  color: #00ff41;
  letter-spacing: 4px;
  line-height: 1;
  text-shadow: 0 0 20px rgba(0,255,65,0.4);
}

.clock-right { text-align: right; }

#dateline {
  font-size: 10px;
  color: #008a22;
  line-height: 1.5;
}

#uptime {
  font-size: 9px;
  color: #003010;
}

/* Signal bars */
.sigbar {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  margin-top: 4px;
}

.sig-label {
  font-size: 8px;
  color: #003010;
  margin-right: 3px;
  letter-spacing: 1px;
}

.sp {
  width: 4px;
  border-radius: 1px 1px 0 0;
  background: #001a08;
}

.sp:nth-child(2) { height: 4px; }
.sp:nth-child(3) { height: 6px; }
.sp:nth-child(4) { height: 8px; }
.sp:nth-child(5) { height: 10px; }
.sp:nth-child(6) { height: 12px; }

.sp.on { background: #00ff41; box-shadow: 0 0 4px rgba(0,255,65,0.4); }

#sig-pct {
  font-size: 8px;
  color: #003010;
  margin-left: 4px;
}

/* ── Calendar ──────────────────────────────────────────────── */
#cal-strip {
  font-size: 10px;
  color: #008a22;
  line-height: 1.8;
  max-height: 54px;
  overflow-y: auto;
  scrollbar-width: none;
}

#cal-strip::-webkit-scrollbar { display: none; }

#cal-btn {
  font-size: 9px;
  color: #005a18;
  cursor: pointer;
  letter-spacing: 1px;
  transition: color 0.15s;
}

#cal-btn:hover { color: #00ff41; }

/* Volume */
#vol-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 5px;
}

#vol-sl {
  flex: 1;
  height: 2px;
  -webkit-appearance: none;
  appearance: none;
  background: #001a08;
  outline: none;
}

#vol-sl::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00ff41;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0,255,65,0.5);
}

#vol-val {
  font-size: 9px;
  color: #004a14;
  min-width: 28px;
  text-align: right;
}

/* ── Tasks ─────────────────────────────────────────────────── */
#task-list {
  max-height: 160px;
  overflow-y: auto;
  scrollbar-width: none;
}

#task-list::-webkit-scrollbar { display: none; }

.ti {
  padding: 4px 8px;
  margin-bottom: 3px;
  border-left: 2px solid #00ff41;
  font-size: 10px;
  color: #00cc33;
  position: relative;
  cursor: pointer;
  background: transparent;
  transition: border-color 0.15s, color 0.15s;
}

.ti::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 100%;
  background: rgba(0,255,65,0.0);
  transition: background 0.15s;
}

.ti:hover::before { background: rgba(0,255,65,0.03); }

.ti.urgent { border-left-color: #ff8800; color: #ff8800; }
.ti.overdue { border-left-color: #ff2200; color: #ff4422; animation: blink 1.2s step-end infinite; }
.ti.done { border-left-color: #003010; color: #003a10; text-decoration: line-through; animation: fadeOut 0.5s ease-out forwards; }

@keyframes fadeout {
    0%   { opacity: 1;   max-height: 60px; margin-bottom: 3px; }
    60%  { opacity: 0.3; max-height: 60px; }
    100% { opacity: 0;   max-height: 0;    margin-bottom: 0; padding: 0; }
}

.ttitle {
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 240px;
  letter-spacing: 1px;
}

.tmeta {
  font-size: 8px;
  color: #004a14;
  display: flex;
  justify-content: space-between;
  margin-top: 1px;
}

.tmeta.urgent { color: #884400; }
.tmeta.overdue { color: #882200; }

.tchk {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: #003a10;
  cursor: pointer;
  transition: color 0.15s;
  -webkit-app-region: no-drag;
}

.tchk:hover { color: #00ff41; }

/* ── Inputs ────────────────────────────────────────────────── */
.add-row {
  display: flex;
  gap: 4px;
  margin-top: 5px;
}

.ginp {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid #003010;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 3px 4px;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 1px;
}

.ginp:focus { border-bottom-color: #00ff41; }
.ginp::placeholder { color: #002a0a; }

.gbtn {
  background: transparent;
  border: 1px solid #003a10;
  color: #005a18;
  font-size: 14px;
  cursor: pointer;
  padding: 0 10px;
  transition: all 0.15s;
  font-family: 'Share Tech Mono', monospace;
}

.gbtn:hover { border-color: #00ff41; color: #00ff41; }

#dl-inp {
  width: 100%;
  margin-top: 4px;
  background: transparent;
  border: none;
  border-bottom: 1px solid #002a0a;
  color: #005a18;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 4px;
  outline: none;
  letter-spacing: 1px;
  transition: border-color 0.15s;
}

#dl-inp:focus { border-bottom-color: #00ff41; }

/* datetime-local calendar icon color */
#dl-inp::-webkit-calendar-picker-indicator { filter: invert(0.3) sepia(1) saturate(5) hue-rotate(90deg); }

/* ── Chat ──────────────────────────────────────────────────── */
#chatlog {
  height: 160px;         /* fixed height — always this tall */
  min-height: 160px;
  max-height: 160px;
  overflow-y: scroll;    /* always shows scrollbar so user knows it scrolls */
  overflow-x: hidden;
  font-size: 12px;
  color: #003010;
  padding: 4px 0;
  margin-bottom: 6px;
  scrollbar-width: thin;
  scrollbar-color: #003010 transparent;
  border-left: 1px solid #001a08;
  padding-left: 8px;
}
#chatlog::-webkit-scrollbar { display: none; }

.ma { color: #008a22; }
.mu { color: #005a18; }
.ms { color: #003010; font-style: italic; }

.ma, .mu, .ms {
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.6;
  margin-bottom: 4px;
  display: block;
}

.chat-row {
  display: flex;
  gap: 4px;
  align-items: center;
}

#micbtn, #sndbtn {
  background: transparent;
  border: none;
  border-bottom: 1px solid #003010;
  color: #005a18;
  font-size: 12px;
  cursor: pointer;
  padding: 2px 8px;
  transition: all 0.15s;
  -webkit-app-region: no-drag;
}

#micbtn:hover, #sndbtn:hover { color: #00ff41; border-bottom-color: #00ff41; }

#micbtn.listening {
  color: #ff4400;
  border-bottom-color: #ff4400;
  animation: blink 0.5s step-end infinite;
}

.voice-status {
  font-size: 8px;
  color: #003010;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ── Footer ────────────────────────────────────────────────── */
#footer {
  border-top: 1px solid #001a08;
  padding-top: 5px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#fstatus { font-size: 8px; color: #005a18; letter-spacing: 1px; }
#ftasks  { font-size: 8px; color: #003a10; }
#fvoice  { font-size: 8px; color: #003a10; }

/* ── Compact mode ──────────────────────────────────────────── */
body.compact #terminal { width: 320px; }
body.compact #cal-sec,
body.compact #task-sec { display: none; }
body.compact #chatlog  { height: 110px; }
body.compact #clock    { font-size: 38px; }
</style>
</head>
<body>

<div id="terminal">

  <!-- Title bar -->
  <div id="titlebar">
    <div class="title-left" style="display:flex;align-items:baseline;gap:6px">
      <span id="logo">BHAI IRRFAN</span>
      <span id="version">v1.0</span>
    </div>
    <div class="title-right">
      <button class="modebtn" id="modebtn">POP</button>
      <span id="dot"></span>
    </div>
  </div>

  <!-- Alert banner -->
  <div id="alert"></div>

  <!-- Scrollable content -->
  <div id="content">

    <!-- Clock -->
    <div class="sec">
      <div class="lbl">SYS.CLOCK</div>
      <div class="clock-row">
        <div id="clock">00:00:00</div>
        <div class="clock-right">
          <div id="dateline">DATE</div>
          <div id="uptime">UPTIME: 00:00:00</div>
        </div>
      </div>
      <div class="sigbar">
        <span class="sig-label">SIG</span>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp" id="s4"></div>
        <div class="sp" id="s5"></div>
        <span id="sig-pct">60%</span>
      </div>
    </div>

    <hr class="div"/>

    <!-- Calendar -->
    <div class="sec" id="cal-sec">
      <div class="lbl">
        GMAIL CALENDAR — TODAY&nbsp;
        <span id="cal-btn" onclick="loadCalendar()">[SYNC]</span>
      </div>
      <div id="cal-strip">Connect Google Calendar...</div>
      <div id="vol-row">
        <span style="font-size:8px;color:#003010;letter-spacing:1px">VOL</span>
        <input type="range" id="vol-sl" min="0" max="1" step="0.05" value="0.85"/>
        <span id="vol-val">85%</span>
      </div>
    </div>

    <hr class="div"/>

    <!-- Tasks -->
    <div class="sec" id="task-sec">
      <div class="lbl">TASK_MATRIX</div>
      <div id="task-list"></div>
      <div class="add-row">
        <input class="ginp" id="new-inp" placeholder="ADD TASK..." maxlength="50"/>
        <button class="gbtn" onclick="addTask()">+</button>
      </div>
      <input type="datetime-local" id="dl-inp" title="Set deadline"/>
    </div>

    <hr class="div"/>

    <!-- Agent -->
    <div class="sec" id="agent-sec">
      <div class="lbl">AGENT: IRRFAN // AI</div>
      <div id="chatlog"></div>
      <div class="chat-row">
        <input class="ginp" id="aginp" placeholder="ASK IRRFAN..."/>
        <button id="micbtn" title="Voice">🎙</button>
        <button id="sndbtn" onclick="sendChat()">▶</button>
      </div>
      <div class="voice-status" id="fvoice">VOICE: AUTO</div>
    </div>

    <!-- Footer -->
    <div id="footer">
      <span id="fstatus">CONNECTING...</span>
      <span id="ftasks">0 TASKS</span>
    </div>

  </div><!-- /content -->

</div><!-- /terminal -->

<script>
const API = 'http://localhost:8000';
const startTime = Date.now();
let tasks = [];
let chatHistory = [];
let currentAudio = null;
let volume = 0.85;
let voiceCloneReady = false;

// ── Drag (fallback for non-frameless mode) ───────────────────
const terminal = document.getElementById('terminal');
const bar = document.getElementById('titlebar');
let drag = false, ox = 0, oy = 0;

bar.addEventListener('mousedown', e => {
  drag = true;
  const r = terminal.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  let nx = Math.max(0, Math.min(e.clientX - ox, window.innerWidth - terminal.offsetWidth));
  let ny = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - terminal.offsetHeight));
  terminal.style.position = 'fixed';
  terminal.style.left = nx + 'px';
  terminal.style.top  = ny + 'px';
  terminal.style.right = 'auto';
  document.body.style.alignItems = 'flex-start';
  document.body.style.justifyContent = 'flex-start';
});
document.addEventListener('mouseup', () => { drag = false; });

// ── Auto-fit PyWebView window height ─────────────────────────
function fitToContent() {
    // Measure the terminal div's actual rendered height
    const terminal = document.getElementById('terminal');
    if (!terminal) return;

    const height = terminal.getBoundingClientRect().height;

    // Only call if pywebview API is available (not in browser)
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.resize_to_content(Math.ceil(height));
    }
}

// Watch terminal div for any size changes
const resizeObserver = new ResizeObserver(() => {
    fitToContent();
});
resizeObserver.observe(document.getElementById('terminal'));

// Also fire on load after fonts/content settle
window.addEventListener('load', () => setTimeout(fitToContent, 300));

// ── Compact mode ─────────────────────────────────────────────
const modeBtn = document.getElementById('modebtn');
function setCompactMode(on) {
  document.body.classList.toggle('compact', on);
  modeBtn.textContent = on ? 'FULL' : 'POP';
  localStorage.setItem('bhaiHudMode', on ? 'compact' : 'full');
  requestAnimationFrame(fitToContent);
}
setCompactMode(localStorage.getItem('bhaiHudMode') === 'compact');
modeBtn.addEventListener('click', e => {
  e.stopPropagation();
  setCompactMode(!document.body.classList.contains('compact'));
});

// ── Volume ───────────────────────────────────────────────────
document.getElementById('vol-sl').addEventListener('input', e => {
  volume = parseFloat(e.target.value);
  document.getElementById('vol-val').textContent = Math.round(volume * 100) + '%';
  requestAnimationFrame(fitToContent);
});

// ── Clock ────────────────────────────────────────────────────
function p(n) { return String(n).padStart(2, '0'); }
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    p(now.getHours()) + ':' + p(now.getMinutes()) + ':' + p(now.getSeconds());
  document.getElementById('dateline').textContent =
    DAYS[now.getDay()] + ' ' + p(now.getDate()) + '-' + MONTHS[now.getMonth()] + '-' + now.getFullYear();
  const el = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('uptime').textContent =
    'UPTIME: ' + p(Math.floor(el/3600)) + ':' + p(Math.floor((el%3600)/60)) + ':' + p(el%60);
  const sig = Math.floor(Math.random() * 2 + 3);
  document.getElementById('s4').className = 'sp' + (sig >= 4 ? ' on' : '');
  document.getElementById('s5').className = 'sp' + (sig >= 5 ? ' on' : '');
  document.getElementById('sig-pct').textContent = Math.round(sig/5*100) + '%';
  checkAlerts();
}
setInterval(tick, 1000); tick();

// ── Health ───────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    document.getElementById('fstatus').textContent =
      '● ONLINE | TTS:' + d.tts + (d.voice_clone ? ' [CLONED]' : '');
    voiceCloneReady = !!d.voice_clone;
    document.getElementById('fvoice').textContent =
      voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';
    document.getElementById('dot').className = '';
  } catch(e) {
    document.getElementById('fstatus').textContent = '● OFFLINE — start backend';
    document.getElementById('fvoice').textContent  = 'VOICE: OFFLINE';
    document.getElementById('dot').className = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

// ── Tasks ────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const r = await fetch(API + '/tasks');
    tasks = await r.json();
    renderTasks();
  } catch(e) { renderTasks(); }
}

function fmtDl(dl) {
  if (!dl) return 'NO DEADLINE';
  const d = new Date(dl), now = Date.now();
  const diff = d.getTime() - now;
  if (diff < 0) return '⚠ OVERDUE';
  const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
  if (h > 24) return 'DL ' + p(d.getMonth()+1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  return 'DL T-' + h + 'H' + p(m) + 'M';
}

function getDoneSecondsLeft(task) {
  if (!task.done || !task.completed_at) return null;
  const completed = new Date(task.completed_at).getTime();
  if (Number.isNaN(completed)) return null;
  return Math.max(0, 120 - Math.floor((Date.now() - completed) / 1000));
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const now  = Date.now();
  list.innerHTML = '';
  tasks.forEach(t => {
    let st = '';
    if (!t.done && t.deadline) {
      const diff = new Date(t.deadline).getTime() - now;
      if (diff < 0) st = 'overdue';
      else if (diff < 3600000) st = 'urgent';
    }
    if (t.done) st = 'done';
    const div = document.createElement('div');
    div.className = 'ti' + (st ? ' ' + st : '');
    const mc = 'tmeta' + (st === 'overdue' ? ' overdue' : st === 'urgent' ? ' urgent' : '');
    const doneAge   = getDoneSecondsLeft(t);
    const doneLabel = t.done ?  '✓ DONE' : 'PENDING';
    div.innerHTML =
      `<div class="ttitle">${t.title}</div>` +
      `<div class="${mc}"><span>${fmtDl(t.deadline)}</span><span>${doneLabel}</span></div>` +
      `<span class="tchk" data-id="${t.id}">${t.done ? '◈' : '◇'}</span>`;
    div.querySelector('.tchk').addEventListener('click', e => {
      e.stopPropagation();
      toggleTask(parseInt(e.target.dataset.id));
    });
    list.appendChild(div);
  });
  const active = tasks.filter(t => !t.done).length;
  document.getElementById('ftasks').textContent = active + ' ACTIVE / ' + tasks.length + ' TOTAL';
  requestAnimationFrame(fitToContent);
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completed_at = t.done ? new Date().toISOString() : null;
  try {
    await fetch(API + '/tasks/' + id, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(t)
    });
  } catch(e) {}
  renderTasks();

  // If task was marked done, remove in after 3 seconds
  if (t.done) {
    setTimeout(() => {
      tasks = tasks.filter(x => x.id !== id);
      renderTasks();
    }, 3000);
  }
}

async function addTask() {
  const inp = document.getElementById('new-inp');
  const dl  = document.getElementById('dl-inp');
  const txt = inp.value.trim().toUpperCase();
  if (!txt) return;
  const task = { title: txt, deadline: dl.value || null, done: false };
  try {
    const r = await fetch(API + '/tasks', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(task)
    });
    tasks.push(await r.json());
  } catch(e) { tasks.push({...task, id: Date.now()}); }
  inp.value = ''; dl.value = '';
  renderTasks();
  requestAnimationFrame(fitToContent);
  addMsg('sys', 'TASK ADDED: ' + txt);
}
document.getElementById('new-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// ── Alerts ───────────────────────────────────────────────────
let lastAlertTime = 0;
function checkAlerts() {
  const now    = Date.now();
  const overdue = tasks.filter(t => !t.done && t.deadline && new Date(t.deadline).getTime() < now);
  const urgent  = tasks.filter(t => !t.done && t.deadline &&
    new Date(t.deadline).getTime() - now < 3600000 && new Date(t.deadline).getTime() > now);
  const banner = document.getElementById('alert');
  if (overdue.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '! OVERDUE: ' + overdue.map(t => t.title.slice(0,18)).join(' | ');
    if (now - lastAlertTime > 120000) {
      lastAlertTime = now;
      speak('Bhai, alert! ' + overdue.length + ' task overdue: ' + overdue[0].title);
    }
  } else if (urgent.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '! URGENT: ' + urgent[0].title.slice(0,26) + ' DEADLINE NEAR';
  } else {
    banner.style.display = 'none';
  }
}

// ── Calendar ─────────────────────────────────────────────────
async function loadCalendar() {
  const strip = document.getElementById('cal-strip');
  strip.textContent = 'SYNCING...';
  try {
    const r    = await fetch(API + '/calendar/today');
    const data = await r.json();
    if (data.error) {
      strip.innerHTML = '<span style="color:#ff6600">' + data.error + '</span> ' +
        '<span onclick="authCal()" style="color:#00ff41;cursor:pointer">[AUTH]</span>';
      return;
    }
    const events = data.events || data;
    if (!events.length) { strip.textContent = 'NO EVENTS TODAY'; return; }
    strip.innerHTML = events.map(e => `<div>+ ${e.start} ${e.summary}</div>`).join('');
  } catch(e) {
    strip.textContent = 'BACKEND OFFLINE';
  }
}
async function authCal() {
  try { await fetch(API + '/calendar/auth'); loadCalendar(); } catch(e) {}
}

// ── TTS ──────────────────────────────────────────────────────
function getMessageType(text) {
  const t = text.toLowerCase();
  if (t.includes('good morning') || t.includes('good evening') || t.includes('good afternoon')) return 'greeting';
  if (t.includes('overdue') || t.includes('alert')) return 'alert';
  if (t.includes('done') || t.includes('completed')) return 'done';
  return 'normal';
}

async function speakInChunks(fullText) {
  const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0);

  if (sentences.length === 0) return;
  document.getElementById('fvoice').textContent = 'VOICE: GENERATING...';
  
  // Pre-fentch all audio in parallel to reduce wait time
  const audioPromises = sentences.map(sentence =>
    fetch(API + '/speak', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ 
        text: sentence, 
        message_type: getMessageType(sentence) 
      })
    })
    .then(r => r.ok ? r.blob() : null)
    .then(blob => blob ? URL.createObjectURL(blob) : null)
    .catch(e => null)
  );

  // const audioBlobs = await Promise.all(audioPromises);
  // for (const sentence of sentences) { await speakOne(sentence); }
  for (const audioPromis of audioPromises){
    const url = await audioPromis;
    if (!url) continue;

    await new Promise(resolve => {
      if (currentAudio) {
        currentAudio.pause();
        URL.revokeObjectURL(currentAudio.src);
      }
      currentAudio = new Audio(url);
      currentAudio.volume = volume;
      currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        resolve();
      };
      currentAudio.onerror = () => resolve();
      currentAudio.play();
    });
  }
  document.getElementById('fvoice').textContent = voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';
}

async function speakOne(text) {
  return new Promise(async resolve => {
    try {
      const r = await fetch(API + '/speak', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ text, message_type: getMessageType(text) })
      });
      if (!r.ok) throw new Error('TTS ' + r.status);
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
      currentAudio = new Audio(url);
      currentAudio.volume = volume;
      currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      currentAudio.onerror = () => resolve();
      currentAudio.play();
    } catch(e) {
      console.error('TTS error:', e.message);
      if (window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.92; u.volume = volume;
        u.onend = () => resolve();
        speechSynthesis.speak(u);
      } else { resolve(); }
    }
  });
}

async function speak(text) {
  try {
    const r = await fetch(API + '/speak', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, message_type: getMessageType(text) })
    });
    if (!r.ok) throw new Error('TTS fail');
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.volume = volume;
    currentAudio.play();
  } catch(e) {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92; u.pitch = 0.8; u.volume = volume;
      speechSynthesis.speak(u);
    }
  }
}

// ── Chat ─────────────────────────────────────────────────────
function addMsg(type, text) {
  const log = document.getElementById('chatlog');
  const div = document.createElement('div');
  div.className = type === 'agent' ? 'ma' : type === 'user' ? 'mu' : 'ms';
  div.textContent = (type === 'agent' ? 'IRRFAN> ' : type === 'user' ? 'YOU> ' : '[SYS] ') + text;

  log.appendChild(div);
  requestAnimationFrame(() => { 
    log.scrollTop = log.scrollHeight; 
  });
  return div;
}

async function sendChat() {
  const inp = document.getElementById('aginp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg('user', txt);

  const thinking = addMsg('sys', '.');
  let dots = 1;
  const dotInterval = setInterval(() => {
    dots = (dots % 3) + 1;
    thinking.textContent = '[SYS] ' + '.'.repeat(dots);
  }, 400);

  try {
    const r = await fetch(API + '/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: txt, history: chatHistory.slice(-16) })
    });
    clearInterval(dotInterval); thinking.remove();
    const d = await r.json();
    if (d.reply) {
      addMsg('agent', d.reply);
      chatHistory.push({ role: 'user',      content: txt });
      chatHistory.push({ role: 'assistant', content: d.reply });
      speakInChunks(d.reply);
    }
  } catch(e) {
    clearInterval(dotInterval); thinking.remove();
    addMsg('sys', 'ERROR: BACKEND OFFLINE');
  }
}

document.getElementById('aginp').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ── Voice input ───────────────────────────────────────────────
const micBtn = document.getElementById('micbtn');
let recog = null;
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.lang = 'en-US'; recog.continuous = false; recog.interimResults = false;
  recog.onresult = e => {
    micBtn.classList.remove('listening');
    document.getElementById('aginp').value = e.results[0][0].transcript;
    sendChat();
  };
  recog.onerror = recog.onend = () => micBtn.classList.remove('listening');
  micBtn.addEventListener('click', () => { micBtn.classList.add('listening'); recog.start(); });
} else {
  micBtn.addEventListener('click', () => addMsg('sys', 'VOICE NOT SUPPORTED'));
}

// ── Quit shortcut ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'Q') {
    if (window.pywebview && window.pywebview.api) window.pywebview.api.quit();
    else window.close();
  }
});

// ── Boot ─────────────────────────────────────────────────────
loadTasks();
loadCalendar();
setTimeout(() => {
  const h = new Date().getHours();
  const greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const n = tasks.filter(t => !t.done).length;
  const msg = greeting + ' Here is Irrfan, online. You have ' + n + ' tasks pending. Shall I brief you?';
  addMsg('agent', msg);
  speak(msg);
}, 1500);
</script>
