<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bhai Irrfan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: transparent;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── Glass HUD Container ──────────────────────────────────── */
#hud-container {
  position: relative;
  width: 420px;
  min-height: 580px;
  max-height: 92vh;
  background: rgba(0, 8, 2, 0.95);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid rgba(0, 255, 65, 0.15);
  border-radius: 6px;
  box-shadow: 
    0 0 60px rgba(0, 255, 65, 0.06),
    inset 0 0 60px rgba(0, 255, 65, 0.02),
    0 20px 60px rgba(0, 0, 0, 0.6);
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: floatIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* ── Scanline overlay ──────────────────────────────────────── */
#scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 6px;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0, 255, 65, 0.015) 2px,
    rgba(0, 255, 65, 0.015) 3px
  );
  z-index: 10;
}

/* ── Glow edge ─────────────────────────────────────────────── */
#glow-edge {
  position: absolute;
  inset: -2px;
  border-radius: 8px;
  background: conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    rgba(0, 255, 65, 0.08) 30deg,
    transparent 60deg,
    transparent 120deg,
    rgba(0, 255, 65, 0.05) 150deg,
    transparent 180deg,
    transparent 240deg,
    rgba(0, 255, 65, 0.06) 270deg,
    transparent 300deg,
    transparent 360deg
  );
  pointer-events: none;
  z-index: 1;
  animation: glowRotate 20s linear infinite;
}

@keyframes glowRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes floatIn {
  0% {
    opacity: 0;
    transform: scale(0.92) translateY(20px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* ── Title Bar ─────────────────────────────────────────────── */
#titlebar {
  position: relative;
  z-index: 2;
  background: rgba(0, 255, 65, 0.08);
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(0, 255, 65, 0.06);
  cursor: grab;
  user-select: none;
}

#titlebar:active { cursor: grabbing; }

.title-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#logo {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: #00ff41;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
  font-weight: bold;
}

#version {
  font-size: 10px;
  color: rgba(0, 255, 65, 0.3);
  letter-spacing: 1px;
}

.title-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

#dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00ff41;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
}

#dot.offline {
  background: #ff2200;
  animation: blink 0.8s step-end infinite;
  box-shadow: 0 0 8px rgba(255, 34, 0, 0.3);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  50.1%, 100% { opacity: 0.2; }
}

.modebtn {
  background: rgba(0, 255, 65, 0.06);
  border: 1px solid rgba(0, 255, 65, 0.1);
  color: rgba(0, 255, 65, 0.4);
  font-family: 'Courier New', monospace;
  font-size: 10px;
  padding: 2px 8px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}

.modebtn:hover {
  background: rgba(0, 255, 65, 0.12);
  color: #00ff41;
  border-color: rgba(0, 255, 65, 0.2);
}

/* ── Alert Banner ──────────────────────────────────────────── */
#alert {
  display: none;
  position: relative;
  z-index: 2;
  background: rgba(204, 51, 0, 0.9);
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 4px 16px;
  text-align: center;
  letter-spacing: 1px;
  animation: alertBlink 0.8s step-end infinite;
}

@keyframes alertBlink {
  0%, 50% { opacity: 1; }
  50.1%, 100% { opacity: 0.4; }
}

/* ── Scrollable Content ────────────────────────────────────── */
#content {
  position: relative;
  z-index: 2;
  padding: 12px 16px 10px;
  max-height: calc(92vh - 120px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 255, 65, 0.1) transparent;
}

#content::-webkit-scrollbar {
  width: 3px;
}

#content::-webkit-scrollbar-track {
  background: transparent;
}

#content::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 65, 0.15);
  border-radius: 2px;
}

/* ── Sections ──────────────────────────────────────────────── */
.sec {
  margin-bottom: 10px;
  padding: 6px 8px;
  border-radius: 4px;
  transition: background 0.2s;
}

.sec:hover {
  background: rgba(0, 255, 65, 0.015);
}

.sec:last-child {
  margin-bottom: 0;
}

.lbl {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.25);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 5px;
  font-weight: 300;
}

/* ── Clock ──────────────────────────────────────────────────── */
.clock-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

#clock {
  font-family: 'VT323', monospace;
  font-size: 42px;
  color: #00ff41;
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(0, 255, 65, 0.08);
  line-height: 1;
  font-weight: bold;
}

.clock-right {
  text-align: right;
}

#dateline {
  font-size: 10px;
  color: rgba(0, 255, 65, 0.4);
  line-height: 1.4;
}

#uptime {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.15);
}

.sigbar {
  display: flex;
  gap: 3px;
  align-items: center;
  margin-top: 4px;
}

.sig-label {
  font-size: 8px;
  color: rgba(0, 255, 65, 0.12);
  letter-spacing: 1px;
  margin-right: 4px;
}

.sp {
  width: 4px;
  height: 6px;
  background: rgba(0, 255, 65, 0.06);
  border-radius: 1px;
  transition: all 0.3s;
}

.sp.on {
  background: #00ff41;
  box-shadow: 0 0 6px rgba(0, 255, 65, 0.15);
}

#sig-pct {
  font-size: 8px;
  color: rgba(0, 255, 65, 0.2);
  margin-left: 4px;
}

/* ── Tasks ──────────────────────────────────────────────────── */
#task-list {
  max-height: 140px;
  overflow-y: auto;
  padding-right: 2px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 255, 65, 0.1) transparent;
}

#task-list::-webkit-scrollbar {
  width: 2px;
}

#task-list::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 65, 0.1);
  border-radius: 2px;
}

.ti {
  padding: 5px 10px;
  margin-bottom: 4px;
  border: 1px solid rgba(0, 255, 65, 0.04);
  border-left: 2px solid #00ff41;
  background: rgba(0, 255, 65, 0.02);
  font-size: 11px;
  color: rgba(0, 255, 65, 0.7);
  position: relative;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
}

.ti:hover {
  background: rgba(0, 255, 65, 0.04);
}

.ti.urgent {
  border-left-color: #ff8800;
  color: #ffaa44;
}

.ti.overdue {
  border-left-color: #ff2200;
  color: #ff5555;
  animation: alertBlink 1s step-end infinite;
}

.ti.done {
  border-left-color: rgba(0, 255, 65, 0.1);
  color: rgba(0, 255, 65, 0.2);
  text-decoration: line-through;
}

.ttitle {
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.tmeta {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.2);
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}

.tmeta.urgent { color: rgba(204, 102, 0, 0.6); }
.tmeta.overdue { color: rgba(204, 34, 0, 0.6); }

.tchk {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 14px;
  color: rgba(0, 255, 65, 0.1);
  transition: all 0.2s;
}

.tchk:hover {
  color: rgba(0, 255, 65, 0.4);
}

/* ── Add Task ───────────────────────────────────────────────── */
.add-row {
  display: flex;
  gap: 4px;
  margin-top: 5px;
}

.ginp {
  flex: 1;
  background: rgba(0, 255, 65, 0.02);
  border: 1px solid rgba(0, 255, 65, 0.06);
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 4px 8px;
  outline: none;
  border-radius: 4px;
  transition: all 0.2s;
}

.ginp:focus {
  border-color: rgba(0, 255, 65, 0.2);
  background: rgba(0, 255, 65, 0.04);
}

.ginp::placeholder {
  color: rgba(0, 255, 65, 0.1);
}

.gbtn {
  background: rgba(0, 255, 65, 0.04);
  border: 1px solid rgba(0, 255, 65, 0.06);
  color: rgba(0, 255, 65, 0.4);
  font-size: 14px;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 4px;
  transition: all 0.2s;
}

.gbtn:hover {
  background: rgba(0, 255, 65, 0.08);
  color: #00ff41;
  border-color: rgba(0, 255, 65, 0.15);
}

#dl-inp {
  width: 100%;
  margin-top: 3px;
  background: rgba(0, 255, 65, 0.02);
  border: 1px solid rgba(0, 255, 65, 0.06);
  color: rgba(0, 255, 65, 0.3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  outline: none;
  border-radius: 4px;
  transition: all 0.2s;
}

#dl-inp:focus {
  border-color: rgba(0, 255, 65, 0.2);
}

/* ── Calendar ───────────────────────────────────────────────── */
#cal-strip {
  max-height: 50px;
  overflow-y: auto;
  font-size: 10px;
  color: rgba(0, 255, 65, 0.3);
  line-height: 1.6;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 255, 65, 0.1) transparent;
}

#cal-strip::-webkit-scrollbar {
  width: 2px;
}

#cal-strip::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 65, 0.1);
  border-radius: 2px;
}

#cal-btn {
  font-size: 8px;
  color: rgba(0, 255, 65, 0.2);
  cursor: pointer;
  text-decoration: underline;
  margin-left: 6px;
  transition: color 0.2s;
}

#cal-btn:hover {
  color: rgba(0, 255, 65, 0.4);
}

#vol-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 5px;
}

#vol-row .lbl {
  font-size: 8px;
  color: rgba(0, 255, 65, 0.15);
  margin-bottom: 0;
}

#vol-sl {
  flex: 1;
  height: 2px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(0, 255, 65, 0.06);
  border-radius: 2px;
  outline: none;
  transition: background 0.2s;
}

#vol-sl::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff41;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0, 255, 65, 0.15);
  transition: all 0.2s;
}

#vol-sl::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.25);
}

#vol-val {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.2);
  min-width: 28px;
  text-align: right;
}

/* ── Chat ───────────────────────────────────────────────────── */
#chatlog {
  height: 80px;
  overflow-y: auto;
  font-size: 11px;
  color: rgba(0, 255, 65, 0.5);
  background: rgba(0, 255, 65, 0.015);
  border: 1px solid rgba(0, 255, 65, 0.04);
  border-radius: 4px;
  padding: 6px 10px;
  margin-bottom: 5px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 255, 65, 0.1) transparent;
}

#chatlog::-webkit-scrollbar {
  width: 2px;
}

#chatlog::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 65, 0.1);
  border-radius: 2px;
}

.ma { color: rgba(0, 255, 65, 0.7); }
.mu { color: rgba(0, 255, 65, 0.3); }
.ms { color: rgba(0, 255, 65, 0.15); font-style: italic; }

.chat-row {
  display: flex;
  gap: 4px;
}

#micbtn {
  background: rgba(0, 255, 65, 0.04);
  border: 1px solid rgba(0, 255, 65, 0.06);
  color: rgba(0, 255, 65, 0.3);
  font-size: 14px;
  cursor: pointer;
  padding: 0 10px;
  border-radius: 4px;
  transition: all 0.2s;
}

#micbtn:hover {
  background: rgba(0, 255, 65, 0.08);
  color: #00ff41;
}

#micbtn.listening {
  border-color: #ff4400;
  color: #ff4400;
  animation: alertBlink 0.5s step-end infinite;
}

#sndbtn {
  background: rgba(0, 255, 65, 0.04);
  border: 1px solid rgba(0, 255, 65, 0.06);
  color: rgba(0, 255, 65, 0.3);
  font-size: 12px;
  cursor: pointer;
  padding: 0 12px;
  border-radius: 4px;
  transition: all 0.2s;
}

#sndbtn:hover {
  background: rgba(0, 255, 65, 0.08);
  color: #00ff41;
}

.voice-status {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.2);
  margin-top: 4px;
  text-align: right;
}

/* ── Footer ──────────────────────────────────────────────────── */
#footer {
  position: absolute;
  bottom: 0;left: 0;right: 0;
  z-index: 2;
  padding: 6px 16px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(0, 255, 65, 0.04);
  background: rgba(0, 0, 0, 0.2);
}

#fstatus {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.2);
}

#ftasks {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.15);
}

#fvoice {
  font-size: 9px;
  color: rgba(0, 255, 65, 0.15);
}

/* ── Compact mode ──────────────────────────────────────────── */
body.compact #hud-container {
  width: 320px;
  min-height: 420px;
}

body.compact #cal-sec,
body.compact #task-sec {
  display: none;
}

body.compact #chatlog {
  height: 90px;
}

body.compact #clock {
  font-size: 36px;
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 420px) {
  #hud-container {
    width: 94vw;
    min-height: auto;
    max-height: 96vh;
    border-radius: 6px;
  }
  
  body.compact #hud-container {
    width: 92vw;
  }
}
</style>
</head>
<body>

<div id="hud-container">
  <div id="glow-edge"></div>
  <div id="scanlines"></div>
  
  <div id="titlebar">
    <div class="title-left">
      <span id="logo">⬛ BHAI IRRFAN</span>
      <span id="version">v1.0</span>
    </div>
    <div class="title-right">
      <button class="modebtn" id="modebtn">POP</button>
      <span id="dot"></span>
    </div>
  </div>
  
  <div id="alert"></div>
  
  <div id="content">
    <!-- Clock -->
    <div class="sec">
      <div class="lbl">&gt; SYS.CLOCK</div>
      <div class="clock-row">
        <div id="clock">00:00:00</div>
        <div class="clock-right">
          <div id="dateline">DATE</div>
          <div id="uptime">UPTIME: 00:00:00</div>
        </div>
      </div>
      <div class="sigbar">
        <span class="sig-label">SIG</span>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp" id="s4"></div>
        <div class="sp" id="s5"></div>
        <span id="sig-pct">60%</span>
      </div>
    </div>
    
    <!-- Calendar -->
    <div class="sec" id="cal-sec">
      <div class="lbl">
        &gt; GMAIL CALENDAR — TODAY
        <span id="cal-btn" onclick="loadCalendar()">[SYNC]</span>
      </div>
      <div id="cal-strip">Connect Google Calendar to see today's events...</div>
      <div id="vol-row">
        <span class="lbl">VOL</span>
        <input type="range" id="vol-sl" min="0" max="1" step="0.05" value="0.85"/>
        <span id="vol-val">85%</span>
      </div>
    </div>
    
    <!-- Tasks -->
    <div class="sec" id="task-sec">
      <div class="lbl">&gt; TASK_MATRIX</div>
      <div id="task-list"></div>
      <div class="add-row">
        <input class="ginp" id="new-inp" placeholder="ADD TASK..." maxlength="50"/>
        <button class="gbtn" onclick="addTask()">+</button>
      </div>
      <input type="datetime-local" id="dl-inp" title="Set deadline"/>
    </div>
    
    <!-- Agent -->
    <div class="sec" id="agent-sec">
      <div class="lbl">&gt; AGENT: IRRFAN // AI</div>
      <div id="chatlog"></div>
      <div class="chat-row">
        <input class="ginp" id="aginp" placeholder="ASK IRRFAN..."/>
        <button id="micbtn" title="Voice">🎙</button>
        <button id="sndbtn" onclick="sendChat()">▶</button>
      </div>
      <div class="voice-status">VOICE: AUTOMATIC</div>
    </div>
  </div>
  
  <div id="footer">
    <span id="fstatus">CONNECTING...</span>
    <span id="ftasks">0 TASKS</span>
    <span id="fvoice">VOICE</span>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
const startTime = Date.now();
let tasks = [];
let chatHistory = [];
let currentAudio = null;
let volume = 0.85;
let voiceCloneReady = false;

// ── Drag ─────────────────────────────────────────────────────
const container = document.getElementById('hud-container');
const bar = document.getElementById('titlebar');
let drag = false, ox = 0, oy = 0;

bar.addEventListener('mousedown', e => {
  drag = true;
  const r = container.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
});

document.addEventListener('mousemove', e => {
  if (!drag) return;
  let nx = e.clientX - ox;
  let ny = e.clientY - oy;
  const maxX = window.innerWidth - container.offsetWidth;
  const maxY = window.innerHeight - container.offsetHeight;
  nx = Math.max(0, Math.min(nx, maxX));
  ny = Math.max(0, Math.min(ny, maxY));
  container.style.position = 'fixed';
  container.style.left = nx + 'px';
  container.style.top = ny + 'px';
  container.style.right = 'auto';
});

document.addEventListener('mouseup', () => { drag = false; });

// ── Compact mode toggle ──────────────────────────────────────
const modeBtn = document.getElementById('modebtn');

function setCompactMode(enabled) {
  document.body.classList.toggle('compact', enabled);
  modeBtn.textContent = enabled ? 'FULL' : 'POP';
  localStorage.setItem('bhaiHudMode', enabled ? 'compact' : 'full');
}

setCompactMode(localStorage.getItem('bhaiHudMode') === 'compact');
modeBtn.addEventListener('click', e => {
  e.stopPropagation();
  setCompactMode(!document.body.classList.contains('compact'));
});

// ── Volume ───────────────────────────────────────────────────
const volSl = document.getElementById('vol-sl');
volSl.addEventListener('input', e => {
  volume = parseFloat(e.target.value);
  document.getElementById('vol-val').textContent = Math.round(volume * 100) + '%';
});

// ── Clock ────────────────────────────────────────────────────
function p(n) { return String(n).padStart(2, '0'); }
const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    p(now.getHours()) + ':' + p(now.getMinutes()) + ':' + p(now.getSeconds());
  document.getElementById('dateline').textContent =
    DAYS[now.getDay()] + ' ' + p(now.getDate()) + '-' + MONTHS[now.getMonth()] + '-' + now.getFullYear();
  const el = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(el / 3600), m = Math.floor((el % 3600) / 60), s = el % 60;
  document.getElementById('uptime').textContent = 'UPTIME: ' + p(h) + ':' + p(m) + ':' + p(s);
  const sig = Math.floor(Math.random() * 2 + 3);
  document.getElementById('s4').className = 'sp' + (sig >= 4 ? ' on' : '');
  document.getElementById('s5').className = 'sp' + (sig >= 5 ? ' on' : '');
  document.getElementById('sig-pct').textContent = Math.round(sig / 5 * 100) + '%';
  checkAlerts();
}
setInterval(tick, 1000);
tick();

// ── Health check ─────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    document.getElementById('fstatus').textContent =
      '● ONLINE | TTS:' + d.tts + (d.voice_clone ? ' [CLONED]' : '');
    voiceCloneReady = !!d.voice_clone;
    document.getElementById('fvoice').textContent =
      voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';

    document.getElementById('fvoice').textContent = 'VOICE: OFFLINE';
    document.getElementById('dot').className = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

// ── Load tasks ────────────────────────────────────────────────
async function loadTasks() {
  try {
    const r = await fetch(API + '/tasks');
    tasks = await r.json();
    renderTasks();
  } catch (e) { renderTasks(); }
}

function fmtDl(dl) {
  if (!dl) return 'NO DEADLINE';
  const d = new Date(dl), now = Date.now();
  const diff = d.getTime() - now;
  if (diff < 0) return '⚠ OVERDUE';
  const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return 'DL ' + p(d.getMonth() + 1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  return 'DL T-' + h + 'H' + p(m) + 'M';
}

function getDoneSecondsLeft(task) {
  if (!task.done || !task.completed_at) return null;
  const completed = new Date(task.completed_at).getTime();
  if (Number.isNaN(completed)) return null;
  return Math.max(0, 120 - Math.floor((Date.now() - completed) / 1000));
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const now = Date.now();
  list.innerHTML = '';
  tasks.forEach(t => {
    let st = '';
    if (!t.done && t.deadline) {
      const dl = new Date(t.deadline).getTime();
      const diff = dl - now;
      if (diff < 0) st = 'overdue';
      else if (diff < 3600000) st = 'urgent';
    }
    if (t.done) st = 'done';
    const div = document.createElement('div');
    div.className = 'ti' + (st ? ' ' + st : '');
    const mc = 'tmeta' + (st === 'overdue' ? ' overdue' : st === 'urgent' ? ' urgent' : '');
    const doneAge = getDoneSecondsLeft(t);
    const doneLabel = t.done ? (doneAge !== null ? '✓ DONE · DEL ' + doneAge + 'S' : '✓ DONE') : 'PENDING';
    div.innerHTML =
      `<div class="ttitle">${t.title}</div>` +
      `<div class="${mc}"><span>${fmtDl(t.deadline)}</span><span>${doneLabel}</span></div>` +
      `<span class="tchk" data-id="${t.id}" title="Done">${t.done ? '◈' : '◇'}</span>`;
    div.querySelector('.tchk').addEventListener('click', e => {
      e.stopPropagation();
      toggleTask(parseInt(e.target.dataset.id));
    });
    list.appendChild(div);
  });
  const active = tasks.filter(t => !t.done).length;
  document.getElementById('ftasks').textContent = active + ' ACTIVE / ' + tasks.length + ' TOTAL';
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completed_at = t.done ? new Date().toISOString() : null;
  try {
    await fetch(API + '/tasks/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(t)
    });
  } catch (e) {}
  renderTasks();
}

async function addTask() {
  const inp = document.getElementById('new-inp');
  const dl = document.getElementById('dl-inp');
  const txt = inp.value.trim().toUpperCase();
  if (!txt) return;
  const task = { title: txt, deadline: dl.value || null, done: false };
  try {
    const r = await fetch(API + '/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(task)
    });
    tasks.push(await r.json());
  } catch (e) {
    tasks.push({ ...task, id: Date.now() });
  }
  inp.value = '';
  dl.value = '';
  renderTasks();
  addMsg('sys', 'TASK ADDED: ' + txt);
}
document.getElementById('new-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// ── Alerts ────────────────────────────────────────────────────
let lastAlertTime = 0;

function checkAlerts() {
  const now = Date.now();
  const overdue = tasks.filter(t => !t.done && t.deadline && new Date(t.deadline).getTime() < now);
  const urgent = tasks.filter(t => !t.done && t.deadline && new Date(t.deadline).getTime() - now < 3600000 && new Date(t.deadline).getTime() > now);
  const banner = document.getElementById('alert');
  if (overdue.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '⚠ OVERDUE: ' + overdue.map(t => t.title.slice(0, 18)).join(' | ');
    if (now - lastAlertTime > 120000) {
      lastAlertTime = now;
      speak('Bhai, alert! ' + overdue.length + ' task is overdue: ' + overdue[0].title);
    }
  } else if (urgent.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '⚡ URGENT: ' + urgent[0].title.slice(0, 26) + ' DEADLINE NEAR';
  } else {
    banner.style.display = 'none';
  }
}

// ── Calendar ──────────────────────────────────────────────────
async function loadCalendar() {
  const strip = document.getElementById('cal-strip');
  strip.textContent = 'SYNCING...';
  try {
    const r = await fetch(API + '/calendar/today');
    const data = await r.json();
    if (data.error) {
      strip.innerHTML = '<span style="color:#ff6600">' + data.error + '</span> <a href="#" onclick="authCal()" style="color:#00ff41">AUTH</a>';
      return;
    }
    const events = data.events || data;
    if (!events.length) { strip.textContent = 'NO EVENTS TODAY'; return; }
    strip.innerHTML = events.map(e => `<div>◆ ${e.start} — ${e.summary}</div>`).join('');
  } catch (e) {
    strip.innerHTML = '<span style="color:#ff4400">BACKEND OFFLINE</span>';
  }
}
async function authCal() {
  try { await fetch(API + '/calendar/auth'); loadCalendar(); } catch (e) {}
}

// ── TTS ───────────────────────────────────────────────────────
async function speak(text) {
  try {
    const r = await fetch(API + '/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!r.ok) throw new Error('TTS fail');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.volume = volume;
    currentAudio.play();
  } catch (e) {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92;
      u.pitch = 0.8;
      u.volume = volume;
      const voices = speechSynthesis.getVoices();
      const male = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Mark'));
      if (male) u.voice = male;
      speechSynthesis.speak(u);
    }
  }
}

// ── Chat ──────────────────────────────────────────────────────
function addMsg(type, text) {
  const log = document.getElementById('chatlog');
  const div = document.createElement('div');
  div.className = type === 'agent' ? 'ma' : type === 'user' ? 'mu' : 'ms';
  div.textContent = (type === 'agent' ? 'IRRFAN> ' : type === 'user' ? 'YOU> ' : '[SYS] ') + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

async function sendChat() {
  const inp = document.getElementById('aginp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg('user', txt);
  
  const thinking = addMsg('sys', '');
  let dots = 0;
  const dotInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    thinking.textContent = '[SYS] ' + '.'.repeat(dots || 1);
  }, 400);
  
  try {
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: txt,
        history: chatHistory.slice(-10)
      })
    });
    const d = await r.json();
    clearInterval(dotInterval);
    thinking.remove();
    
    if (d.reply) {
      addMsg('agent', d.reply);
      chatHistory.push({ role: 'user', content: txt });
      chatHistory.push({ role: 'assistant', content: d.reply });
      speakInChunks(d.reply);
    }
  } catch (e) {
    clearInterval(dotInterval);
    thinking.remove();
    addMsg('sys', 'ERROR: BACKEND OFFLINE');
  }
}

function getMessageType(text) {
  const t = text.toLowerCase();
  if (t.includes('good morning') || t.includes('good evening') || t.includes('good afternoon')) return 'greeting';
  if (t.includes('overdue') || t.includes('alert')) return 'alert';
  if (t.includes('done') || t.includes('completed')) return 'done';
  return 'normal';
}

async function speakInChunks(fullText) {
  const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0);
  document.getElementById('fvoice').textContent = 'VOICE: GENERATING...';
  for (const sentence of sentences) {
    await speakOne(sentence);
  }
  document.getElementById('fvoice').textContent = voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';
}

async function speakOne(text) {
  return new Promise(async (resolve) => {
    try {
      const r = await fetch(API + '/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, message_type: getMessageType(text) })
      });
      if (!r.ok) throw new Error('TTS fail');
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
      currentAudio = new Audio(url);
      currentAudio.volume = volume;
      currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      currentAudio.onerror = () => resolve();
      currentAudio.play();
    } catch (e) {
      console.error('TTS error:', e);
      if (window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.92;
        u.volume = volume;
        u.onend = () => resolve();
        speechSynthesis.speak(u);
      } else {
        resolve();
      }
    }
  });
}

document.getElementById('aginp').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

loadTasks();

  addMsg('agent', msg);
  speak(msg);
}, 1500);
