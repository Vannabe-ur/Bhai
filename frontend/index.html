<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bhai Irrfan</title>
<link rel="stylesheet" href="Style.css"/>
</head>
<body>

<div id="terminal">

  <!-- Title bar: logo | sigbar + dot -->
  <div id="titlebar">
    <div style="display:flex;align-items:baseline;gap:6px">
      <span id="logo">BHAI IRRFAN</span>
      <span id="version">v1.0</span>
    </div>
    <div class="title-right">
      <!-- Signal bars moved here from clock section -->
      <div class="sigbar">
        <span class="sig-label">SIG</span>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp on"></div>
        <div class="sp" id="s4"></div>
        <div class="sp" id="s5"></div>
        <span id="sig-pct">60%</span>
      </div>
      <span id="dot"></span>
    </div>
  </div>

  <!-- Alert banner -->
  <div id="alert"></div>

  <!-- Content -->
  <div id="content">

    <!-- Clock: time on its own row, dateline below -->
    <div class="sec">
      <div class="lbl">SYS.CLOCK</div>
      <div class="clock-row">
        <div id="clock">00:00:00</div>
      </div>
      <div id="dateline">DATE</div>
      <div id="uptime"></div>
    </div>

    <hr class="div"/>

    <!-- Calendar -->
    <div class="sec" id="cal-sec">
      <div class="lbl">
        GMAIL CALENDAR — TODAY&nbsp;
        <span id="cal-btn" onclick="loadCalendar()">[SYNC]</span>
      </div>
      <div id="cal-strip">Connect Google Calendar...</div>
      <div id="vol-row">
        <span style="font-size:8px;color:#003010;letter-spacing:1px">VOL</span>
        <input type="range" id="vol-sl" min="0" max="1" step="0.05" value="0.85"/>
        <span id="vol-val">85%</span>
      </div>
    </div>

    <hr class="div"/>

    <!-- Tasks -->
    <div class="sec" id="task-sec">
      <div class="lbl">TASK_MATRIX</div>
      <div id="task-list"></div>
      <div class="add-row">
        <input class="ginp" id="new-inp" placeholder="ADD TASK..." maxlength="50"/>
        <button class="gbtn" onclick="addTask()">+</button>
      </div>
      <input type="datetime-local" id="dl-inp" title="Set deadline"/>
    </div>

    <hr class="div"/>

    <!-- Agent -->
    <div class="sec" id="agent-sec">
      <div class="lbl">AGENT: IRRFAN // AI</div>
      <div id="chatlog"></div>
      <div class="chat-row">
        <input class="ginp" id="aginp" placeholder="ASK IRRFAN..."/>
        <button id="micbtn" title="Voice">🎙</button>
        <button id="sndbtn" onclick="sendChat()">▶</button>
      </div>
      <div class="voice-status" id="fvoice">VOICE: AUTO</div>
    </div>

    <!-- Footer -->
    <div id="footer">
      <span id="fstatus">CONNECTING...</span>
      <span id="ftasks">0 TASKS</span>
    </div>

  </div><!-- /content -->

</div><!-- /terminal -->

<script>
const API = 'http://localhost:8000';
const startTime = Date.now();
let tasks = [];
let chatHistory = [];
let currentAudio = null;
let volume = 0.85;
let voiceCloneReady = false;

// ── Auto-fit window height ───────────────────────────────────
function fitToContent() {
  const terminal = document.getElementById('terminal');
  if (!terminal) return;
  const height = terminal.getBoundingClientRect().height;
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.resize_to_content(Math.ceil(height));
  }
}
const resizeObserver = new ResizeObserver(() => fitToContent());
resizeObserver.observe(document.getElementById('terminal'));
window.addEventListener('load', () => setTimeout(fitToContent, 300));

// ── Drag ─────────────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const bar = document.getElementById('titlebar');
let drag = false, ox = 0, oy = 0;
bar.addEventListener('mousedown', e => {
  drag = true;
  const r = terminal.getBoundingClientRect();
  ox = e.clientX - r.left; oy = e.clientY - r.top;
});
document.addEventListener('mousemove', e => {
  if (!drag) return;
  let nx = Math.max(0, Math.min(e.clientX - ox, window.innerWidth  - terminal.offsetWidth));
  let ny = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - terminal.offsetHeight));
  terminal.style.position = 'fixed';
  terminal.style.left = nx + 'px';
  terminal.style.top  = ny + 'px';
  terminal.style.right = 'auto';
  document.body.style.alignItems = 'flex-start';
  document.body.style.justifyContent = 'flex-start';
});
document.addEventListener('mouseup', () => { drag = false; });

// ── Volume ───────────────────────────────────────────────────
document.getElementById('vol-sl').addEventListener('input', e => {
  volume = parseFloat(e.target.value);
  document.getElementById('vol-val').textContent = Math.round(volume * 100) + '%';
});

// ── Clock ────────────────────────────────────────────────────
function p(n) { return String(n).padStart(2, '0'); }
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    p(now.getHours()) + ':' + p(now.getMinutes()) + ':' + p(now.getSeconds());
  document.getElementById('dateline').textContent =
    DAYS[now.getDay()] + ' ' + p(now.getDate()) + '-' + MONTHS[now.getMonth()] + '-' + now.getFullYear();
  const el = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('uptime').textContent =
    'UPTIME: ' + p(Math.floor(el/3600)) + ':' + p(Math.floor((el%3600)/60)) + ':' + p(el%60);
  const sig = Math.floor(Math.random() * 2 + 3);
  document.getElementById('s4').className = 'sp' + (sig >= 4 ? ' on' : '');
  document.getElementById('s5').className = 'sp' + (sig >= 5 ? ' on' : '');
  document.getElementById('sig-pct').textContent = Math.round(sig/5*100) + '%';
  checkAlerts();
}
setInterval(tick, 1000); tick();

// ── Health ───────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    document.getElementById('fstatus').textContent =
      '● ONLINE | TTS:' + d.tts + (d.voice_clone ? ' [CLONED]' : '');
    voiceCloneReady = !!d.voice_clone;
    document.getElementById('fvoice').textContent =
      voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';
    document.getElementById('dot').className = '';
  } catch(e) {
    document.getElementById('fstatus').textContent = '● OFFLINE — start backend';
    document.getElementById('fvoice').textContent  = 'VOICE: OFFLINE';
    document.getElementById('dot').className = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

// ── Tasks ────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const r = await fetch(API + '/tasks');
    tasks = await r.json();
    renderTasks();
  } catch(e) { renderTasks(); }
}

function fmtDl(dl) {
  if (!dl) return 'NO DEADLINE';
  const d = new Date(dl), now = Date.now();
  const diff = d.getTime() - now;
  if (diff < 0) return '⚠ OVERDUE';
  const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
  if (h > 24) return 'DL ' + p(d.getMonth()+1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  return 'DL T-' + h + 'H' + p(m) + 'M';
}

function getDoneSecondsLeft(task) {
  if (!task.done || !task.completed_at) return null;
  const completed = new Date(task.completed_at).getTime();
  if (Number.isNaN(completed)) return null;
  return Math.max(0, 120 - Math.floor((Date.now() - completed) / 1000));
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const now  = Date.now();
  list.innerHTML = '';
  tasks.forEach(t => {
    let st = '';
    if (!t.done && t.deadline) {
      const diff = new Date(t.deadline).getTime() - now;
      if (diff < 0) st = 'overdue';
      else if (diff < 3600000) st = 'urgent';
    }
    if (t.done) st = 'done';
    const div = document.createElement('div');
    div.className = 'ti' + (st ? ' ' + st : '');
    const mc = 'tmeta' + (st === 'overdue' ? ' overdue' : st === 'urgent' ? ' urgent' : '');
    const doneLabel = t.done ? '✓ DONE — removing in 3s' : 'PENDING';
    div.innerHTML =
      `<div class="ttitle">${t.title}</div>` +
      `<div class="${mc}"><span>${fmtDl(t.deadline)}</span><span>${doneLabel}</span></div>` +
      `<span class="tchk" data-id="${t.id}">${t.done ? '◈' : '◇'}</span>`;
    div.querySelector('.tchk').addEventListener('click', e => {
      e.stopPropagation();
      toggleTask(parseInt(e.target.dataset.id));
    });
    list.appendChild(div);
  });
  const active = tasks.filter(t => !t.done).length;
  document.getElementById('ftasks').textContent = active + ' ACTIVE / ' + tasks.length + ' TOTAL';
  requestAnimationFrame(fitToContent);
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  t.completed_at = t.done ? new Date().toISOString() : null;
  try {
    await fetch(API + '/tasks/' + id, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(t)
    });
  } catch(e) {}
  renderTasks();
  if (t.done) {
    setTimeout(() => {
      tasks = tasks.filter(x => x.id !== id);
      renderTasks();
    }, 3000);
  }
}

async function addTask() {
  const inp = document.getElementById('new-inp');
  const dl  = document.getElementById('dl-inp');
  const txt = inp.value.trim().toUpperCase();
  if (!txt) return;
  const task = { title: txt, deadline: dl.value || null, done: false };
  try {
    const r = await fetch(API + '/tasks', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(task)
    });
    tasks.push(await r.json());
  } catch(e) { tasks.push({...task, id: Date.now()}); }
  inp.value = ''; dl.value = '';
  renderTasks();
  requestAnimationFrame(fitToContent);
  addMsg('sys', 'TASK ADDED: ' + txt);
}
document.getElementById('new-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// ── Alerts ───────────────────────────────────────────────────
let lastAlertTime = 0;
function checkAlerts() {
  const now     = Date.now();
  const overdue = tasks.filter(t => !t.done && t.deadline && new Date(t.deadline).getTime() < now);
  const urgent  = tasks.filter(t => !t.done && t.deadline &&
    new Date(t.deadline).getTime() - now < 3600000 && new Date(t.deadline).getTime() > now);
  const banner = document.getElementById('alert');
  if (overdue.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '! OVERDUE: ' + overdue.map(t => t.title.slice(0,18)).join(' | ');
    if (now - lastAlertTime > 120000) {
      lastAlertTime = now;
      speak('Bhai, alert! ' + overdue.length + ' task overdue: ' + overdue[0].title);
    }
  } else if (urgent.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '! URGENT: ' + urgent[0].title.slice(0,26) + ' DEADLINE NEAR';
  } else {
    banner.style.display = 'none';
  }
}

// ── Calendar ─────────────────────────────────────────────────
async function loadCalendar() {
  const strip = document.getElementById('cal-strip');
  strip.textContent = 'SYNCING...';
  try {
    const r    = await fetch(API + '/calendar/today');
    const data = await r.json();
    if (data.error) {
      strip.innerHTML = '<span style="color:#ff6600">' + data.error + '</span> ' +
        '<span onclick="authCal()" style="color:#00ff41;cursor:pointer">[AUTH]</span>';
      return;
    }
    const events = data.events || data;
    if (!events.length) { strip.textContent = 'NO EVENTS TODAY'; return; }
    strip.innerHTML = events.map(e => `<div>+ ${e.start} ${e.summary}</div>`).join('');
  } catch(e) {
    strip.textContent = 'BACKEND OFFLINE';
  }
}
async function authCal() {
  try { await fetch(API + '/calendar/auth'); loadCalendar(); } catch(e) {}
}

// ── TTS ──────────────────────────────────────────────────────
function getMessageType(text) {
  const t = text.toLowerCase();
  if (t.includes('good morning') || t.includes('good evening') || t.includes('good afternoon')) return 'greeting';
  if (t.includes('overdue') || t.includes('alert')) return 'alert';
  if (t.includes('done') || t.includes('completed')) return 'done';
  return 'normal';
}

async function speakInChunks(fullText) {
  const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0);
  if (sentences.length === 0) return;
  document.getElementById('fvoice').textContent = 'VOICE: GENERATING...';

  const audioPromises = sentences.map(sentence =>
    fetch(API + '/speak', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: sentence, message_type: getMessageType(sentence) })
    })
    .then(r => r.ok ? r.blob() : null)
    .then(blob => blob ? URL.createObjectURL(blob) : null)
    .catch(() => null)
  );

  for (const audioPromise of audioPromises) {
    const url = await audioPromise;
    if (!url) continue;
    await new Promise(resolve => {
      if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
      currentAudio = new Audio(url);
      currentAudio.volume = volume;
      currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      currentAudio.onerror = () => resolve();
      currentAudio.play();
    });
  }
  document.getElementById('fvoice').textContent = voiceCloneReady ? 'VOICE: READY' : 'VOICE: NEED SAMPLE';
}

async function speak(text) {
  try {
    const r = await fetch(API + '/speak', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text, message_type: getMessageType(text) })
    });
    if (!r.ok) throw new Error('TTS fail');
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.volume = volume;
    currentAudio.play();
  } catch(e) {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92; u.pitch = 0.8; u.volume = volume;
      speechSynthesis.speak(u);
    }
  }
}

// ── Chat ─────────────────────────────────────────────────────
function addMsg(type, text) {
  const log = document.getElementById('chatlog');
  const div = document.createElement('div');
  div.className = type === 'agent' ? 'ma' : type === 'user' ? 'mu' : 'ms';
  div.textContent = (type === 'agent' ? 'IRRFAN> ' : type === 'user' ? 'YOU> ' : '[SYS] ') + text;
  log.appendChild(div);
  requestAnimationFrame(() => { log.scrollTop = log.scrollHeight; });
  return div;
}

async function sendChat() {
  const inp = document.getElementById('aginp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg('user', txt);

  const thinking = addMsg('sys', '.');
  let dots = 1;
  const dotInterval = setInterval(() => {
    dots = (dots % 3) + 1;
    thinking.textContent = '[SYS] ' + '.'.repeat(dots);
  }, 400);

  try {
    const r = await fetch(API + '/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: txt, history: chatHistory.slice(-16) })
    });
    clearInterval(dotInterval); thinking.remove();
    const d = await r.json();
    if (d.reply) {
      addMsg('agent', d.reply);
      chatHistory.push({ role: 'user',      content: txt });
      chatHistory.push({ role: 'assistant', content: d.reply });
      speakInChunks(d.reply);
    }
  } catch(e) {
    clearInterval(dotInterval); thinking.remove();
    addMsg('sys', 'ERROR: BACKEND OFFLINE');
  }
}
document.getElementById('aginp').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// ── Voice input ───────────────────────────────────────────────
const micBtn = document.getElementById('micbtn');
let recog = null;
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recog.lang = 'en-US'; recog.continuous = false; recog.interimResults = false;
  recog.onresult = e => {
    micBtn.classList.remove('listening');
    document.getElementById('aginp').value = e.results[0][0].transcript;
    sendChat();
  };
  recog.onerror = recog.onend = () => micBtn.classList.remove('listening');
  micBtn.addEventListener('click', () => { micBtn.classList.add('listening'); recog.start(); });
} else {
  micBtn.addEventListener('click', () => addMsg('sys', 'VOICE NOT SUPPORTED'));
}

// ── Quit shortcut ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'Q') {
    if (window.pywebview && window.pywebview.api) window.pywebview.api.quit();
    else window.close();
  }
});

// ── Boot ─────────────────────────────────────────────────────
loadTasks();
loadCalendar();
setTimeout(() => {
  const h = new Date().getHours();
  const greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const n = tasks.filter(t => !t.done).length;
  const msg = greeting + ' Here is Irrfan, online. You have ' + n + ' tasks pending. Shall I brief you?';
  addMsg('agent', msg);
  speak(msg);
}, 1500);
</script>
</body>
</html>
